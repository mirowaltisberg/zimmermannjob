name: Scrape Jobs

on:
  schedule:
    # 9 AM UTC = 10 AM CET (winter) / 11 AM CEST (summer)
    - cron: "0 9 * * *"
  workflow_dispatch: # Allow manual trigger from Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        chunk: [0, 1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install python-jobspy supabase

      - name: Run scraper (chunk ${{ matrix.chunk }}/5)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/scrape-jobs.py --results 25 --chunk ${{ matrix.chunk }} --total-chunks 5
